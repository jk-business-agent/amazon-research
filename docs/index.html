<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>American Business Alternatives — Archive</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
    background: #f1f5f9;
    color: #0f172a;
  }
  .wrap { max-width: 800px; margin: 0 auto; padding: 24px 20px 60px; }
  .header-band {
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: #fff;
    border-radius: 14px;
    padding: 28px 32px;
    margin-bottom: 22px;
  }
  .header-band h1 { margin: 0 0 6px; font-size: 24px; }
  .header-band p { color: #94a3b8; font-size: 14px; margin: 0; }
  ul.archive-list { list-style: none; margin: 0; padding: 0; }
  ul.archive-list li {
    background: #ffffff;
    border: 1px solid #e2e8f0;
    border-radius: 10px;
    padding: 16px 20px;
    margin-bottom: 12px;
  }
  .archive-date { font-weight: 700; font-size: 15px; margin-bottom: 4px; }
  .archive-headline { font-size: 14px; color: #334155; line-height: 1.5; }
  .archive-link { font-size: 13px; margin-top: 6px; display: inline-block; }
  .empty-state {
    background: #ffffff;
    border: 1px dashed #cbd5e1;
    border-radius: 10px;
    padding: 20px;
    font-size: 14px;
    color: #64748b;
  }
  a { color: #2563eb; text-decoration: none; }
</style>
</head>
<body>
<div class="wrap">

  <div class="header-band">
    <h1>American Business Alternatives — Archive</h1>
    <p>Reverse-chronological index of comparative research reports identifying American business alternatives to top Amazon products.</p>
  </div>

  <div class="empty-state">No reports yet. The first report will appear here after the workflow's first run.</div>

</div>
</body>
</html>
